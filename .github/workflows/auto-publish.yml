name: Auto publish app data

on:
  repository_dispatch:
    types: [app-data-updated]

concurrency:
  group: auto-publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  export-commit-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Export Postgres data to JSON files
        run: node scripts/export-db-to-data.mjs
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

      - name: Commit and push when data changed
        env:
          REASON: ${{ github.event.client_payload.reason || 'app-data-updated' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/organizations.json data/organization-sections.json
          if git diff --staged --quiet; then
            echo "No data changes to publish."
            exit 0
          fi
          git commit -m "Sync app data from production database." -m "Triggered by: ${REASON}"
          git push
